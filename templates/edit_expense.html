{% extends 'base.html' %}
{% block title %}Edit Expense{% endblock %}
{% block content %}
<div class="row">
  <div class="col-md-6">
    <h4 class="mb-4">Edit Expense</h4>
    <div class="card p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Title</label>
          <input name="title" class="form-control" value="{{ expense['title'] }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Amount (₹)</label>
          <input name="amount" type="number" step="0.01" min="0.01" class="form-control" value="{{ expense['amount'] }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label>
          <select name="category" class="form-select">
            {% for c in categories %}
            <option {% if c == expense['category'] %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Date</label>
          <input name="date" type="date" class="form-control" value="{{ expense['date'] }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2">{{ expense['notes'] or '' }}</textarea>
        </div>
        <button class="btn btn-primary">Update</button>
        <a href="/expenses" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
