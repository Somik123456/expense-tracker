{% extends 'base.html' %}
{% block title %}Add Expense{% endblock %}
{% block content %}
<div class="row">
  <div class="col-md-6">
    <h4 class="mb-4">Add Expense</h4>
    <div class="card p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Title <span class="text-danger">*</span></label>
          <input name="title" class="form-control" required autofocus placeholder="e.g. Lunch at Subway">
        </div>
        <div class="mb-3">
          <label class="form-label">Amount (₹) <span class="text-danger">*</span></label>
          <input name="amount" type="number" step="0.01" min="0.01" class="form-control" required placeholder="0.00">
        </div>
        <div class="mb-3">
          <label class="form-label">Category <span class="text-danger">*</span></label>
          <select name="category" class="form-select" required>
            {% for c in categories %}
            <option>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Date <span class="text-danger">*</span></label>
          <input name="date" type="date" class="form-control" value="{{ today }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2" placeholder="Optional notes..."></textarea>
        </div>
        <button class="btn btn-primary">Add Expense</button>
        <a href="/dashboard" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
