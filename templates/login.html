{% extends 'base.html' %}
{% block title %}Login — Expense Tracker{% endblock %}
{% block auth_content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4">
      <h4 class="mb-3 text-center"><i class="bi bi-wallet2 text-primary"></i> Expense Tracker</h4>
      <h6 class="text-center text-muted mb-4">Sign in to your account</h6>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100">Login</button>
      </form>
      <hr>
      <p class="text-center mb-0">No account? <a href="/register">Register here</a></p>
    </div>
  </div>
</div>
{% endblock %}
